</h3>
<div class="para logical">
<div class="para">The <dfn class="terminology">Dirac delta</dfn> can be thought of as</div>
<div class="displaymath process-math">
\begin{equation*}
\delta(t-a)=\displaystyle\lim_{\epsilon \rightarrow 0} \delta_{\epsilon}(t-a) = \left\{ \begin{array}{ll}
0, &amp; \quad t \neq a \\ 
\infty, &amp; \quad t=a.
\end{array}\right.
\end{equation*}
</div>
